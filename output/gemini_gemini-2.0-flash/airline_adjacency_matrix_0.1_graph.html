                  nodes = new vis.DataSet([{"color": "#97c2fc", "id": "BookReservation", "label": "BookReservation", "shape": "dot"}, {"color": "#97c2fc", "id": "Calculate", "label": "Calculate", "shape": "dot"}, {"color": "#97c2fc", "id": "CancelReservation", "label": "CancelReservation", "shape": "dot"}, {"color": "#97c2fc", "id": "GetReservationDetails", "label": "GetReservationDetails", "shape": "dot"}, {"color": "#97c2fc", "id": "GetUserDetails", "label": "GetUserDetails", "shape": "dot"}, {"color": "#97c2fc", "id": "ListAllAirports", "label": "ListAllAirports", "shape": "dot"}, {"color": "#97c2fc", "id": "SearchDirectFlight", "label": "SearchDirectFlight", "shape": "dot"}, {"color": "#97c2fc", "id": "SearchOnestopFlight", "label": "SearchOnestopFlight", "shape": "dot"}, {"color": "#97c2fc", "id": "SendCertificate", "label": "SendCertificate", "shape": "dot"}, {"color": "#97c2fc", "id": "TransferToHumanAgents", "label": "TransferToHumanAgents", "shape": "dot"}, {"color": "#97c2fc", "id": "UpdateReservationBaggages", "label": "UpdateReservationBaggages", "shape": "dot"}, {"color": "#97c2fc", "id": "UpdateReservationFlights", "label": "UpdateReservationFlights", "shape": "dot"}, {"color": "#97c2fc", "id": "UpdateReservationPassengers", "label": "UpdateReservationPassengers", "shape": "dot"}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "BookReservation", "label": "The reservation ID, which is likely part\u2026", "title": "The reservation ID, which is likely part of the output of BookReservation, is used as input for CancelReservation to cancel the reservation.", "to": "CancelReservation"}, {"arrows": "to", "from": "BookReservation", "label": "The reservation ID, which is likely part\u2026", "title": "The reservation ID, which is likely part of the output of BookReservation, is used as input for GetReservationDetails to retrieve the reservation details.", "to": "GetReservationDetails"}, {"arrows": "to", "from": "CancelReservation", "label": "GetReservationDetails is a neighbour of \u2026", "title": "GetReservationDetails is a neighbour of CancelReservation because GetReservationDetails can be called to confirm the cancellation, using the reservation_id from CancelReservation as input.", "to": "GetReservationDetails"}, {"arrows": "to", "from": "CancelReservation", "label": "TransferToHumanAgents is a neighbour of \u2026", "title": "TransferToHumanAgents is a neighbour of CancelReservation because after attempting to cancel a reservation, the user might still have issues and request to be transferred to a human agent. The summary can include the reservation_id from CancelReservation.", "to": "TransferToHumanAgents"}, {"arrows": "to", "from": "CancelReservation", "label": "UpdateReservationBaggages is a neighbour\u2026", "title": "UpdateReservationBaggages is a neighbour of CancelReservation because the user might want to update the baggages after cancelling the reservation, or during the cancellation process, they might decide to update instead. The reservation_id from CancelReservation is used as input.", "to": "UpdateReservationBaggages"}, {"arrows": "to", "from": "CancelReservation", "label": "UpdateReservationFlights is a neighbour \u2026", "title": "UpdateReservationFlights is a neighbour of CancelReservation because the user might want to update the flights after cancelling the reservation, or during the cancellation process, they might decide to update instead. The reservation_id from CancelReservation is used as input.", "to": "UpdateReservationFlights"}, {"arrows": "to", "from": "CancelReservation", "label": "UpdateReservationPassengers is a neighbo\u2026", "title": "UpdateReservationPassengers is a neighbour of CancelReservation because the user might want to update the passengers after cancelling the reservation, or during the cancellation process, they might decide to update instead. The reservation_id from CancelReservation is used as input.", "to": "UpdateReservationPassengers"}, {"arrows": "to", "from": "GetReservationDetails", "label": "CancelReservation uses the reservation_i\u2026", "title": "CancelReservation uses the reservation_id from GetReservationDetails to cancel the reservation.", "to": "CancelReservation"}, {"arrows": "to", "from": "GetReservationDetails", "label": "GetReservationDetails can be called mult\u2026", "title": "GetReservationDetails can be called multiple times to check the reservation details, so it\u0027s a neighbour.", "to": "GetReservationDetails"}, {"arrows": "to", "from": "GetReservationDetails", "label": "UpdateReservationBaggages uses the reser\u2026", "title": "UpdateReservationBaggages uses the reservation_id from GetReservationDetails to update the baggage information.", "to": "UpdateReservationBaggages"}, {"arrows": "to", "from": "GetReservationDetails", "label": "UpdateReservationFlights uses the reserv\u2026", "title": "UpdateReservationFlights uses the reservation_id from GetReservationDetails to update the flight information.", "to": "UpdateReservationFlights"}, {"arrows": "to", "from": "GetUserDetails", "label": "The user_id obtained from GetUserDetails\u2026", "title": "The user_id obtained from GetUserDetails can be used as input for BookReservation to book a new reservation for the user.", "to": "BookReservation"}, {"arrows": "to", "from": "GetUserDetails", "label": "The reservation details obtained from Ge\u2026", "title": "The reservation details obtained from GetUserDetails can be used as input for GetReservationDetails to get more details about a specific reservation.", "to": "GetReservationDetails"}, {"arrows": "to", "from": "GetUserDetails", "label": "The user_id obtained from GetUserDetails\u2026", "title": "The user_id obtained from GetUserDetails can be used as input for SendCertificate to send a certificate to the user.", "to": "SendCertificate"}, {"arrows": "to", "from": "ListAllAirports", "label": "SearchDirectFlight can use the output of\u2026", "title": "SearchDirectFlight can use the output of ListAllAirports to let user choose origin and destination.", "to": "SearchDirectFlight"}, {"arrows": "to", "from": "ListAllAirports", "label": "SearchOnestopFlight can use the output o\u2026", "title": "SearchOnestopFlight can use the output of ListAllAirports to let user choose origin and destination.", "to": "SearchOnestopFlight"}, {"arrows": "to", "from": "SearchDirectFlight", "label": "The output of SearchDirectFlight, which \u2026", "title": "The output of SearchDirectFlight, which contains flight details (origin, destination, date), can be used as input to BookReservation to book a flight.", "to": "BookReservation"}, {"arrows": "to", "from": "SearchDirectFlight", "label": "The output of SearchDirectFlight, which \u2026", "title": "The output of SearchDirectFlight, which contains flight details (origin, destination, date), can be used as input to SearchOnestopFlight to find connecting flights based on the direct flight search.", "to": "SearchOnestopFlight"}, {"arrows": "to", "from": "SearchOnestopFlight", "label": "The output of SearchOnestopFlight, which\u2026", "title": "The output of SearchOnestopFlight, which contains flight details (origin, destination, date), can be used as input to BookReservation to book the flight.", "to": "BookReservation"}, {"arrows": "to", "from": "SearchOnestopFlight", "label": "SearchDirectFlight is a neighbor because\u2026", "title": "SearchDirectFlight is a neighbor because the user might want to compare direct flights with one-stop flights, using the same origin, destination, and date.", "to": "SearchDirectFlight"}, {"arrows": "to", "from": "UpdateReservationBaggages", "label": "GetReservationDetails is a neighbor beca\u2026", "title": "GetReservationDetails is a neighbor because it retrieves details of a reservation, and the reservation_id from UpdateReservationBaggages can be used as input to GetReservationDetails to view the updated baggage information. Scenario: A user updates their baggage information and then wants to view the updated details.", "to": "GetReservationDetails"}, {"arrows": "to", "from": "UpdateReservationFlights", "label": "GetReservationDetails can use the reserv\u2026", "title": "GetReservationDetails can use the reservation_id from UpdateReservationFlights to get the updated reservation details.", "to": "GetReservationDetails"}, {"arrows": "to", "from": "UpdateReservationPassengers", "label": "GetReservationDetails can use the reserv\u2026", "title": "GetReservationDetails can use the reservation_id from UpdateReservationPassengers to retrieve the updated reservation details.", "to": "GetReservationDetails"}]);

                  nodeColors = {};

                  var options = {
    "configure": {

};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
