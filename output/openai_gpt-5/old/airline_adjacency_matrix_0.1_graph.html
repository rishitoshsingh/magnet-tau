d a full flights array; the existing itinerary from the details is used to craft the new flights list and provides the reservation_id.", "to": "UpdateReservationFlights"}, {"arrows": "to", "from": "GetReservationDetails", "label": "UpdateReservationPassengers requires res\u2026", "title": "UpdateReservationPassengers requires reservation_id and a passengers array; the current passenger data from the details is used/modified and passed along with the reservation_id.", "to": "UpdateReservationPassengers"}, {"arrows": "to", "from": "GetUserDetails", "label": "Neighbour. get_user_details returns user\u2026", "title": "Neighbour. get_user_details returns user profile info (including user_id and saved payment methods/payment_ids). Those values can be used to fill BookReservation\u2019s user_id and payment_methods inputs when booking for that user.", "to": "BookReservation"}, {"arrows": "to", "from": "GetUserDetails", "label": "Neighbour. get_user_details includes the\u2026", "title": "Neighbour. get_user_details includes the user\u2019s reservations; a reservation_id from that list can be passed to cancel_reservation.", "to": "CancelReservation"}, {"arrows": "to", "from": "GetUserDetails", "label": "Neighbour. A reservation_id obtained fro\u2026", "title": "Neighbour. A reservation_id obtained from the user\u2019s reservations returned by get_user_details can be used to call get_reservation_details.", "to": "GetReservationDetails"}, {"arrows": "to", "from": "GetUserDetails", "label": "Neighbour. After fetching user details, \u2026", "title": "Neighbour. After fetching user details, the user_id from that output can be used as input to send_certificate, and the decision to send can be based on the retrieved profile/status.", "to": "SendCertificate"}, {"arrows": "to", "from": "GetUserDetails", "label": "Neighbour. update_reservation_baggages n\u2026", "title": "Neighbour. update_reservation_baggages needs reservation_id and payment_id\u2014both can come from get_user_details (reservations list and stored payment methods).", "to": "UpdateReservationBaggages"}, {"arrows": "to", "from": "GetUserDetails", "label": "Neighbour. update_reservation_flights ne\u2026", "title": "Neighbour. update_reservation_flights needs reservation_id and payment_id\u2014both can be sourced from get_user_details\u2019 output.", "to": "UpdateReservationFlights"}, {"arrows": "to", "from": "GetUserDetails", "label": "Neighbour. update_reservation_passengers\u2026", "title": "Neighbour. update_reservation_passengers needs reservation_id, which can be taken from the reservations returned by get_user_details.", "to": "UpdateReservationPassengers"}, {"arrows": "to", "from": "ListAllAirports", "label": "Neighbour: The list of airports provides\u2026", "title": "Neighbour: The list of airports provides IATA codes/cities that become the origin and destination inputs required by book_reservation.", "to": "BookReservation"}, {"arrows": "to", "from": "ListAllAirports", "label": "Neighbour: search_direct_flight requires\u2026", "title": "Neighbour: search_direct_flight requires origin and destination IATA codes; these can be taken directly from the airports list output.", "to": "SearchDirectFlight"}, {"arrows": "to", "from": "ListAllAirports", "label": "Neighbour: search_onestop_flight require\u2026", "title": "Neighbour: search_onestop_flight requires origin and destination IATA codes; these can be taken directly from the airports list output.", "to": "SearchOnestopFlight"}, {"arrows": "to", "from": "SearchDirectFlight", "label": "Yes. The results from SearchDirectFlight\u2026", "title": "Yes. The results from SearchDirectFlight provide specific flight options (e.g., flight_number and date) that are then selected and passed into BookReservation along with the same origin/destination, making the search output a direct part of the booking input.", "to": "BookReservation"}, {"arrows": "to", "from": "SearchDirectFlight", "label": "Yes. If SearchDirectFlight returns no av\u2026 elected flight options (flight_number and date) returned by the search to modify an existing reservation\u2019s flights (requires reservation_id from elsewhere).", "to": "UpdateReservationFlights"}, {"arrows": "to", "from": "SendCertificate", "label": "True. After sending a certificate, the u\u2026", "title": "True. After sending a certificate, the user can use that certificate (as a \u0027certificate_*\u0027 payment_id with an amount) in BookReservation.payment_methods to pay for a booking, so SendCertificate\u2019s outcome directly feeds into this function.", "to": "BookReservation"}, {"arrows": "to", "from": "SendCertificate", "label": "True. UpdateReservationBaggages requires\u2026", "title": "True. UpdateReservationBaggages requires a payment_id; a newly sent certificate (certificate_*) can be applied to pay baggage fees, so the SendCertificate result is used here.", "to": "UpdateReservationBaggages"}, {"arrows": "to", "from": "SendCertificate", "label": "True. UpdateReservationFlights requires \u2026", "title": "True. UpdateReservationFlights requires a payment_id; a certificate issued by SendCertificate can be used to cover fare differences/change fees, making it dependent on that output.", "to": "UpdateReservationFlights"}, {"arrows": "to", "from": "UpdateReservationBaggages", "label": "CancelReservation takes a reservation_id\u2026", "title": "CancelReservation takes a reservation_id. After updating baggages, you can immediately cancel the same reservation using the reservation_id available from the update result, so the target\u2019s output can feed into CancelReservation.", "to": "CancelReservation"}, {"arrows": "to", "from": "UpdateReservationBaggages", "label": "GetReservationDetails takes a reservatio\u2026", "title": "GetReservationDetails takes a reservation_id. A common next step after updating baggages is to retrieve the reservation to verify the changes, using the reservation_id from the update result.", "to": "GetReservationDetails"}, {"arrows": ": "UpdateReservationBaggages is a neighbour\u2026", "title": "UpdateReservationBaggages is a neighbour: passenger changes can affect baggage allowance; the reservation_id from the updated reservation is used to perform a baggage update (with additional payment info as needed).", "to": "UpdateReservationBaggages"}, {"arrows": "to", "from": "UpdateReservationPassengers", "label": "UpdateReservationFlights is a neighbour:\u2026", "title": "UpdateReservationFlights is a neighbour: changes in passengers (e.g., adding an infant or name change requiring reissue) can necessitate modifying flights; the reservation_id from the update feeds into this call.", "to": "UpdateReservationFlights"}]);
