        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',

              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "green", "id": "GetServiceDetails", "label": "GetServiceDetails", "shape": "dot", "title": "A customer can reasonably start with \u201cWhat does service X include/cost?\u201d and provide a human-facing service_id (e.g., mobile_unlimited). The function is a read-only lookup with no complex prerequisites beyond knowing/asking for the service identifier."}, {"color": "green", "id": "GetDeviceDetails", "label": "GetDeviceDetails", "shape": "dot", "title": "A customer can reasonably start by asking \u201cWhat kind of device is X?\u201d or \u201cDo you have X device?\u201d and provide the device_name directly (from the allowed catalog names). No internal-only identifiers or multi-step prerequisites are required to call this function."}, {"color": "green", "id": "GetBillingDetails", "label": "GetBillingDetails", "shape": "dot", "title": "A customer can naturally start a support chat with \u201cWhat\u2019s my current balance / last payment / autopay status?\u201d, and the agent\u2019s first meaningful action can be to fetch billing details. Required input is just customer_id, which is typically available after routine authentication/lookup."}, {"color": "green", "id": "ManageService", "label": "ManageService", "shape": "dot", "title": "A customer can reasonably start by asking to add/remove/list their services (e.g., \u201ccancel my TV package\u201d or \u201cwhat plans do I have?\u201d). Required inputs are customer_id plus action, and for add/remove the user can provide the desired service_id and which devices to associate (device_ids can be confirmed from the customer\u2019s known device list per policy)."}, {"color": "green", "id": "TroubleshootDevice", "label": "TroubleshootDevice", "shape": "dot", "title": "A customer can start a support chat with \u201cMy \u003cdevice\u003e has no service / slow speeds / battery drain,\u201d and the agent can directly call this tool using the user-provided device_name and issue without needing internal-only identifiers or multi-step prerequisite workflows."}, {"color": "green", "id": "CreateSupportTicket", "label": "CreateSupportTicket", "shape": "dot", "title": "A customer can reasonably contact support to report an issue and ask to open a ticket; the agent can create it as the first meaningful action once they have the customer_id and the user-stated issue category (and optionally urgency for priority). These inputs are typically available at the start of the interaction."}, {"color": "green", "id": "GetSupportTicketDetails", "label": "GetSupportTicketDetails", "shape": "dot", "title": "A customer can start a support interaction by asking \u201cWhat\u2019s the status of ticket TICKET001?\u201d The only required input is a user-provided ticket_id, with no heavy prerequisite discovery steps."}, {"color": "green", "id": "AddDevice", "label": "AddDevice", "shape": "dot", "title": "A customer can directly ask support to add a specific device to their account (e.g., \u201cadd an iPhone 15 to my account\u201d). Required inputs are customer_id (obtainable via prior authentication/lookup per wiki) and device_name (user-provided from the supported catalog list), so this can be the first meaningful action after identification."}, {"color": "green", "id": "ManageBilling", "label": "ManageBilling", "shape": "dot", "title": "A customer can directly request changes like enabling/disabling paperless billing, turning auto-pay on/off, or changing billing cycle. The required inputs are typically available at the start: customer_id (from authentication/lookup) plus the user\u2019s desired values for paperless, auto_pay, and billing_cycle."}, {"color": "green", "id": "GetServices", "label": "GetServices", "shape": "dot", "title": "A customer can reasonably start by asking \u201cWhat plans/services do you offer?\u201d and the agent\u2019s first meaningful action can be to call get_services. It requires no inputs and has no prerequisite discovery beyond the request itself."}, {"color": "green", "id": "GetSeniorDiscount", "label": "GetSeniorDiscount", "shape": "dot", "title": "A customer can initiate contact asking \u201cWhat would my plan cost with the senior discount?\u201d and provide the price they were quoted. The only required input is a human-provided original_price string, with no internal identifiers or prerequisite workflows needed."}, {"color": "#97c2fc", "id": "ModifySupportTicket", "label": "ModifySupportTicket", "shape": "dot"}, {"color": "green", "id": "RecordPayment", "label": "RecordPayment", "shape": "dot", "title": "A customer can directly ask to \u201cmake a payment\u201d and provide (or confirm) the needed inputs in one turn: customer_id, amount, payment method (credit_card/bank_transfer), and payment date. No additional domain-specific discovery is inherently required beyond standard authentication/lookup steps assumed handled."}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "GetServiceDetails", "label": "After reviewing a service\u2019s details, a c\u2026", "title": "After reviewing a service\u2019s details, a customer may ask which phones/routers/TV boxes are compatible or what a listed device is; the agent would look up catalog specs. User provides device_name (e.g., \u201ciPhone 15 Pro\u201d).", "to": "GetDeviceDetails"}, {"arrows": "to", "from": "GetServiceDetails", "label": "Service price questions often lead into \u2026", "title": "Service price questions often lead into \u201chow does this affect my bill?\u201d; the agent would pull the customer\u2019s billing record to compare monthly_charges and totals. User provides customer_id.", "to": "GetBillingDetails"}, {"arrows": "to", "from": "GetServiceDetails", "label": "If the customer wants to add/remove/swit\u2026", "title": "If the customer wants to add/remove/switch services after confirming the service\u2019s name/category/price, the next step is to manage services on the account (with explicit confirmation per policy). User provides customer_id, action (add/remove/list), and service_id; for add optionally device_ids.", "to": "ManageService"}, {"arrows": "to", "from": "GetServiceDetails", "label": "If service details reveal it\u2019s tied to a\u2026", "title": "If service details reveal it\u2019s tied to a device issue (e.g., mobile plan but \u2018no service\u2019 complaint), the agent may proceed to device troubleshooting. User provides device_name and issue (no_service/slow_speeds/battery_drain).", "to": "TroubleshootDevice"}, {"arrows": "to", "from": "GetServiceDetails", "label": "If the service details don\u2019t resolve the\u2026", "title": "If the service details don\u2019t resolve the customer\u2019s problem (outage, provisioning issue, pricing dispute), a common next step is opening a support ticket. User provides customer_id plus category (e.g., internet/mobile/tv/billing) and priority if needed.", "to": "CreateSupportTicket"}, {"arrows": "to", "from": "GetServiceDetails", "label": "If the user is adding a service and need\u2026", "title": "If the user is adding a service and needs to associate a new device (or their device isn\u2019t on the account), the agent may add the device before/alongside service management (with explicit confirmation). User provides customer_id and device_name.", "to": "AddDevice"}, {"arrows": "to", "from": "GetServiceDetails", "label": "After discussing service pricing, custom\u2026", "title": "After discussing service pricing, customers often ask to turn on/off paperless or autopay or change billing cycle; the agent would update billing preferences (with explicit confirmation). User provides customer_id, paperless, auto_pay, billing_cycle.", "to": "ManageBilling"}, {"arrows": "to", "from": "GetServiceDetails", "label": "If the user doesn\u2019t know the exact servi\u2026", "title": "If the user doesn\u2019t know the exact service_id or wants to compare options after checking one service, the agent may list the full service catalog to help them choose. No user inputs required.", "to": "GetServices"}, {"arrows": "to", "from": "GetServiceDetails", "label": "If the customer asks whether they qualif\u2026", "title": "If the customer asks whether they qualify for a senior discount or wants the discounted monthly price after seeing service price, the agent can compute it. User provides original_price (as a string, e.g., \"95.00\").", "to": "GetSeniorDiscount"}, {"arrows": "to", "from": "GetServiceDetails", "label": "If the service pricing discussion turns \u2026", "title": "If the service pricing discussion turns into \u201cI want to pay my balance now,\u201d the agent may record a payment (with explicit confirmation). User provides customer_id, amount, method, and date.", "to": "RecordPayment"}, {"arrows": "to", "from": "GetDeviceDetails", "label": "After identifying a device in the catalo\u2026", "title": "After identifying a device in the catalog, the next step is often to confirm the compatible plan/service the user is asking about (e.g., \u201cDoes this phone work with Unlimited?\u201d). Agent would use user-provided service_id (e.g., mobile_unlimited).", "to": "GetServiceDetails"}, {"arrows": "to", "from": "GetDeviceDetails", "label": "After confirming what the device is, a c\u2026", "title": "After confirming what the device is, a common next step is to add/remove/list services tied to that device (e.g., activating a phone on a plan). Requires user-provided customer_id, action (add/remove/list), service_id (if add/remove), and device_ids (if adding and associating).", "to": "ManageService"}, {"arrows": "to", "from": "GetDeviceDetails", "label": "Once the device is identified, the user \u2026", "title": "Once the device is identified, the user may ask for help fixing an issue on that device (no service/slow speeds/battery drain). Requires user-provided device_name and issue.", "to": "TroubleshootDevice"}, {"arrows": "to", "from": "GetDeviceDetails", "label": "If device details confirm the device/iss\u2026", "title": "If device details confirm the device/issue context but troubleshooting can\u2019t proceed or needs tracking, the agent may open a ticket. Requires user-provided customer_id, category (often device/mobile/internet), and optionally priority based on stated urgency.", "to": "CreateSupportTicket"}, {"arrows": "to", "from": "GetDeviceDetails", "label": "After confirming the exact device model \u2026", "title": "After confirming the exact device model exists in the catalog, the user may want it added to their account/device list (e.g., new phone they bought). Requires user-provided customer_id and device_name (the catalog name).", "to": "AddDevice"}, {"arrows": "to", "from": "GetBillingDetails", "label": "After reviewing billing charges, the cus\u2026", "title": "After reviewing billing charges, the customer may ask what a specific line-item/service (e.g., a monthly charge key like \u0027internet_fiber_1gb\u0027) is and what it costs; agent fetches service metadata. Inputs: service_id.", "to": "GetServiceDetails"}, {"arrows": "to", "from": "GetBillingDetails", "label": "A common next step after seeing billing \u2026", "title": "A common next step after seeing billing details is to add/remove/list services to address high monthly charges or correct plan enrollment; requires explicit user confirmation before add/remove. Inputs: customer_id and action (plus service_id; and device_ids if adding).", "to": "ManageService"}, {"arrows": "to", "from": "GetBillingDetails", "label": "If billing details reveal a billing prob\u2026", "title": "If billing details reveal a billing problem (unexpected charges, missing payment, autopay issue) the agent may open a billing support case. Inputs: customer_id, category=\u0027billing\u0027, and priority.", "to": "CreateSupportTicket"}, {"arrows": "to", "from": "GetBillingDetails", "label": "If the customer wants to compare their c\u2026", "title": "If the customer wants to compare their current monthly charges to available plans after seeing billing details, the agent may pull the full service catalog. Inputs: none.", "to": "GetServices"}, {"arrows": "to", "from": "GetBillingDetails", "label": "If the customer wants to pay their outst\u2026", "title": "If the customer wants to pay their outstanding balance after seeing the current_balance, recording a payment is a direct next step; requires explicit user confirmation because it changes billing records. Inputs: customer_id, amount, method, date.", "to": "RecordPayment"}, {"arrows": "to", "from": "ManageService", "label": "After managing services (especially list\u2026", "title": "After managing services (especially list/remove), the user may ask what a specific service includes or costs; agent fetches details for the mentioned service. Inputs: service_id.", "to": "GetServiceDetails"}, {"arrows": "to", "from": "ManageService", "label": "After adding/removing/associating device\u2026", "title": "After adding/removing/associating devices with a service, the user may ask about a particular device model/category; agent can look up the catalog info. Inputs: device_name.", "to": "GetDeviceDetails"}, {"arrows": "to", "from": "ManageService", "label": "After adding/removing a service, a commo\u2026", "title": "After adding/removing a service, a common next question is how it affects the bill/current balance; agent retrieves billing record. Inputs: customer_id.", "to": "GetBillingDetails"}, {"arrows": "to", "from": "ManageService", "label": "If the user removed/added a service due \u2026", "title": "If the user removed/added a service due to connectivity/performance issues, the next step may be to troubleshoot the affected device. Inputs: device_name, issue.", "to": "TroubleshootDevice"}, {"arrows": "to", "from": "ManageService", "label": "If manage_service fails or reveals a com\u2026", "title": "If manage_service fails or reveals a complex/outage-like issue (e.g., service can\u2019t be added/removed as expected), the agent may open a ticket for follow-up. Inputs: customer_id, category (often mobile/internet/tv), priority (if provided/assessed).", "to": "CreateSupportTicket"}, {"arrows": "to", "from": "ManageService", "label": "After a service change, if a ticket alre\u2026", "title": "After a service change, if a ticket already exists (or was just created) the user may ask for its status/details. Inputs: ticket_id.", "to": "GetSupportTicketDetails"}, {"arrows": "to", "from": "ManageService", "label": "When adding a service, the workflow may \u2026", "title": "When adding a service, the workflow may require associating devices; if the needed device isn\u2019t on the account yet, agent adds it first then re-attempts service association. Inputs: customer_id, device_name.", "to": "AddDevice"}, {"arrows": "to", "from": "ManageService", "label": "If the user changes services and then as\u2026", "title": "If the user changes services and then asks to update billing settings (paperless/autopay/billing cycle) as part of the same request, the agent updates billing preferences. Inputs: customer_id, paperless, auto_pay, billing_cycle.", "to": "ManageBilling"}, {"arrows": "to", "from": "ManageService", "label": "If the user is deciding what to add afte\u2026", "title": "If the user is deciding what to add after listing current services, the agent may show the available service catalog to pick the right service_id. Inputs: none.", "to": "GetServices"}, {"arrows": "to", "from": "ManageService", "label": "If a ticket was created/identified durin\u2026", "title": "If a ticket was created/identified during the service-change interaction, a normal next step is to update its status/priority (e.g., set in_progress or urgent) based on new info. Inputs: ticket_id, status, priority.", "to": "ModifySupportTicket"}, {"arrows": "to", "from": "TroubleshootDevice", "label": "If troubleshooting returns an error (dev\u2026", "title": "If troubleshooting returns an error (device not found) or the user is unsure which exact model/category they have, the agent may immediately look up device catalog details to confirm the correct supported device name/category. User would provide device_name.", "to": "GetDeviceDetails"}, {"arrows": "to", "from": "TroubleshootDevice", "label": "If troubleshooting steps don\u2019t resolve t\u2026", "title": "If troubleshooting steps don\u2019t resolve the issue, or it appears to be an outage/urgent problem, a common next step is to open a support ticket for escalation/tracking. User/agent would use customer_id and choose category (e.g., device/mobile/internet) and optionally priority based on urgency.", "to": "CreateSupportTicket"}, {"arrows": "to", "from": "CreateSupportTicket", "label": "Customers often ask to add a device whil\u2026", "title": "Customers often ask to add a device while reporting an issue; after creating the ticket, the agent may add the device to the account so it can be associated/handled. Requires customer_id and device_name, plus explicit user confirmation since it modifies data.", "to": "AddDevice"}, {"arrows": "to", "from": "GetSupportTicketDetails", "label": "Often after checking ticket details, the\u2026", "title": "Often after checking ticket details, the user asks to update it (e.g., close it if resolved, mark in_progress, or raise priority). Inputs needed: ticket_id plus new status and priority (with explicit user confirmation per policy).", "to": "CreateSupportTicket"}, {"arrows": "to", "from": "GetSupportTicketDetails", "label": "Not a routine follow-up to ticket detail\u2026", "title": "Not a routine follow-up to ticket details; applying a senior discount is pricing-related and requires explicit user intent plus original_price, and isn\u2019t directly connected to ticket status/priority.", "to": "ModifySupportTicket"}, {"arrows": "to", "from": "AddDevice", "label": "A common follow-up after adding the devi\u2026", "title": "A common follow-up after adding the device is the user asking what device type it is or confirming it was the right model; the agent can retrieve catalog metadata. Inputs: device_name.", "to": "GetDeviceDetails"}, {"arrows": "to", "from": "AddDevice", "label": "Common immediate follow-up is to attach \u2026", "title": "Common immediate follow-up is to attach the newly added device to an existing/new service (e.g., add mobile plan for the phone, or associate router with internet). Inputs: customer_id, action (\u0027add\u0027/\u0027list\u0027), and if adding/removing service then service_id; to associate device(s), devices_ids (device_id(s) the user selects/agent reads from customer devices list).", "to": "ManageService"}, {"arrows": "to", "from": "ManageBilling", "label": "Common follow-up is to verify the new se\u2026", "title": "Common follow-up is to verify the new settings and current balance/next bill date after the update. Inputs: customer_id.", "to": "GetBillingDetails"}, {"arrows": "to", "from": "ManageBilling", "label": "A user changing billing settings may nex\u2026", "title": "A user changing billing settings may next ask to change plan/services due to bill concerns; listing/removing/adding services is a plausible next step. Inputs: customer_id, action (list/add/remove), and if add/remove then service_id (and possibly devices_ids).", "to": "ManageService"}, {"arrows": "to", "from": "ManageBilling", "label": "If the user still has a billing problem \u2026", "title": "If the user still has a billing problem after updating preferences (e.g., auto-pay didn\u2019t process, cycle change confusion), opening a billing support ticket is a common next step. Inputs: customer_id, category=\u0027billing\u0027, priority (optional).", "to": "CreateSupportTicket"}, {"arrows": "to", "from": "ManageBilling", "label": "If the user wants to compare available s\u2026", "title": "If the user wants to compare available service options/pricing after adjusting billing settings to reduce costs, pulling the service catalog can be a plausible next action. Inputs: none.", "to": "GetServices"}, {"arrows": "to", "from": "ManageBilling", "label": "If the user\u2019s billing request includes m\u2026", "title": "If the user\u2019s billing request includes making a payment right after updating auto-pay/paperless (e.g., \u2018also pay my balance today\u2019), recording a payment is a plausible next step. Inputs: customer_id, amount, method, date.", "to": "RecordPayment"}, {"arrows": "to", "from": "GetServices", "label": "After listing the full service catalog, \u2026", "title": "After listing the full service catalog, the agent may fetch one specific plan the customer points to for confirmation (price/category) before proceeding. User provides: service_id (e.g., \u0027internet_fiber_1gb\u0027).", "to": "GetServiceDetails"}, {"arrows": "to", "from": "GetServices", "label": "A common next step after seeing availabl\u2026", "title": "A common next step after seeing available plans is the customer asking to add/remove/switch a service on their account; the agent would then manage the service. User provides: customer_id, action (add/remove/list), service_id (if add/remove), and possibly devices_ids to associate.", "to": "ManageService"}, {"arrows": "to", "from": "GetServices", "label": "If the user wants to proceed after revie\u2026", "title": "If the user wants to proceed after reviewing available services, the agent may create a ticket for installation/activation or plan-change assistance (especially if the change can\u2019t be completed immediately). User provides: customer_id, category, and priority (or agent infers priority).", "to": "CreateSupportTicket"}, {"arrows": "to", "from": "GetServices", "label": "After selecting a service from the catal\u2026", "title": "After selecting a service from the catalog, the customer may need to add a compatible device to their account before associating it with the service; adding the device is a plausible next step. User provides: customer_id and device_name.", "to": "AddDevice"}, {"arrows": "to", "from": "GetServices", "label": "If the customer asks what a plan would c\u2026", "title": "If the customer asks what a plan would cost with a senior discount after viewing service prices, the agent can apply the discount calculation. User provides: original_price (as a string, e.g., \u002795.00\u0027).", "to": "GetSeniorDiscount"}, {"arrows": "to", "from": "GetSeniorDiscount", "label": "After computing the discounted price, th\u2026", "title": "After computing the discounted price, the agent may need to show/verify what plan price that discount was applied to (e.g., customer asks \u201cwhat\u2019s the regular price vs discounted?\u201d). Inputs: service_id.", "to": "GetServiceDetails"}, {"arrows": "to", "from": "ModifySupportTicket", "label": "If, after updating the existing ticket, \u2026", "title": "If, after updating the existing ticket, the user reports a distinct additional issue, the agent may create a new ticket (avoiding duplicates per policy). Inputs: customer_id, category, priority (if specified by user).", "to": "CreateSupportTicket"}, {"arrows": "to", "from": "ModifySupportTicket", "label": "A common follow-up after modifying a tic\u2026", "title": "A common follow-up after modifying a ticket is to verify what\u2019s on file by pulling the ticket record and reading back status/priority to the user. Input: ticket_id.", "to": "GetSupportTicketDetails"}, {"arrows": "to", "from": "ModifySupportTicket", "label": "After adjusting a ticket\u2019s status/priori\u2026", "title": "After adjusting a ticket\u2019s status/priority, adding a device is not a typical next step unless the user explicitly requests device management as part of resolving the ticket. (Would need customer_id and device_name.)", "to": "AddDevice"}, {"arrows": "to", "from": "RecordPayment", "label": "Common follow-up is the customer asking \u2026", "title": "Common follow-up is the customer asking to confirm the payment posted and what the new balance/last payment is; agent would call this using customer_id.", "to": "GetBillingDetails"}, {"arrows": "to", "from": "RecordPayment", "label": "If the payment fails (e.g., no billing r\u2026", "title": "If the payment fails (e.g., no billing record) or the customer disputes posting/needs escalation, creating a billing support ticket is a plausible next step; inputs: customer_id, category=\u0027billing\u0027, and priority (if provided/assessed).", "to": "CreateSupportTicket"}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": false
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "barnesHut": {
            "avoidOverlap": 0,
            "centralGravity": 0.3,
            "damping": 0.09,
            "gravitationalConstant": -80000,
            "springConstant": 0.001,
            "springLength": 250
        },
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
