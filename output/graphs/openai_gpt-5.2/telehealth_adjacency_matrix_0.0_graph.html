ions", "label": "CheckDrugInteractions", "shape": "dot", "title": "A patient can reasonably initiate contact saying they took/are considering a medication and want to know if it interacts with their current meds. The required inputs (primary_medication and a list of current_medications) are patient-provided in natural language, and no additional domain-specific prerequisite workflows are required beyond routine authentication."}, {"color": "#97c2fc", "id": "ScheduleAppointment", "label": "ScheduleAppointment", "shape": "dot"}, {"color": "green", "id": "CancelAppointment", "label": "CancelAppointment", "shape": "dot", "title": "A patient can reasonably start a support interaction by saying they want to cancel an appointment and providing the appointment ID (e.g., APPT001). Authentication is a standard prerequisite per policy and can be handled up front; once authenticated, the only needed input for this tool is appointment_id, which is user-facing."}, {"color": "green", "id": "RescheduleAppointment", "label": "RescheduleAppointment", "shape": "dot", "title": "A patient can plausibly contact support specifically to move an existing appointment and provide the needed inputs (appointment_id, new_date in YYYY-MM-DD, new_time in HH:MM). Authentication and the required explicit confirmation step are routine preliminaries that don\u2019t require additional domain tools beyond the scheduling action."}, {"color": "#97c2fc", "id": "UpdatePrescriptionSupplier", "label": "UpdatePrescriptionSupplier", "shape": "dot"}, {"color": "green", "id": "ListTelemetryDevices", "label": "ListTelemetryDevices", "shape": "dot", "title": "A customer or care-team member could reasonably start by asking \u201cWhat telemetry devices are available/shipped/missing?\u201d The function can be called immediately with optional user-stated filters like status_filter and limit and doesn\u2019t require internal-only identifiers."}, {"color": "#97c2fc", "id": "GetTelemetryUpload", "label": "GetTelemetryUplo ike bill_insurance/voucher_id).", "to": "ScheduleAppointment"}, {"arrows": "to", "from": "GetProviderDetails", "label": "After provider details, a patient may de\u2026", "title": "After provider details, a patient may decide to cancel an existing appointment with that provider (\u201ccancel my visit with Dr. X\u201d). Inputs: appointment_id (patient provides or agent has from context).", "to": "CancelAppointment"}, {"arrows": "to", "from": "GetMedicalRecord", "label": "After viewing a record, patients often a\u2026", "title": "After viewing a record, patients often ask for the underlying visit details (meeting link, copay, status). Agent can call this using appointment_id shown in the record (or provided by user).", "to": "GetAppointmentDetails"}, {"arrows": "to", "from": "GetMedicalRecord", "label": "If the record mentions a provider and th\u2026", "title": "If the record mentions a provider and the patient asks about the provider\u2019s specialty, fees, languages, or schedule, the agent can fetch it next using provider_id from the record (or user).", "to": "GetProviderDetails"}, {"arrows": "to", "from": "GetMedicalRecord", "label": "Common follow-up when the patient doesn\u2019\u2026", "title": "Common follow-up when the patient doesn\u2019t know the record_id/appointment_id or wants \u201call my records\u201d: list records first, then select one. Uses patient_id (already known post-auth).", "to": "ListPatientMedicalRecords"}, {"arrows": "to", "from": "GetMedicalRecord", "label": "After reviewing a record tied to a prior\u2026", "title": "After reviewing a record tied to a prior visit, patients commonly ask about upcoming visits or to find the related appointment; listing appointments uses patient_id.", "to": "ListPatientAppointments"}, {"arrows": "to", "from": "GetMedicalRecord", "label": "If the record\u2019s plan says \u201cfollow up in \u2026", "title": "If the record\u2019s plan says \u201cfollow up in X weeks,\u201d the patient may want to move an existing a ion and current_medications (from regimen output and/or patient statement).", "to": "CheckDrugInteractions"}, {"arrows": "to", "from": "GetRegimenOptions", "label": "If the patient wants to retrieve details\u2026", "title": "If the patient wants to retrieve details for a specific day\u2019s device data it\u2019s still unrelated to regimen optimization and needs device_id and date. Not a plausible next step.", "to": "GetTelemetryUpload"}, {"arrows": "to", "from": "GetRegimenOptions", "label": "If regimen options discussion results in\u2026", "title": "If regimen options discussion results in an audit/compliance note like \u201cpatient requested cost-optimized generic option; advised to discuss with provider,\u201d appending a record note is plausible. Inputs needed: record_id and note (optional metadata).", "to": "UpdateMedicalRecordNote"}, {"arrows": "to", "from": "ListPatientMedicalRecords", "label": "After listing records, patients often as\u2026", "title": "After listing records, patients often ask for details about a specific encounter tied to a record line. Agent would call this using appointment_id (e.g., APPT002) shown in the records list.", "to": "GetAppointmentDetails"}, {"arrows": "to", "from": "ListPatientMedicalRecords", "label": "After seeing records/medications, the pa\u2026", "title": "After seeing records/medications, the patient may ask who the prescribing clinician was or to confirm provider info. Agent would call this using provider_id (obtained from the chosen record via follow-up lookup, or from an appointment details view) after the patient indicates which visit/record they mean (record_id or appointment_id).", "to": "GetProviderDetails"}, {"arrows": "to", "from": "ListPatientMedicalRecords", "label": "A common next step is the patient asking\u2026", "title": "A common next step is the patient asking to open one record from the list to view the full note/prescriptions. Agent would call this using record_id (e.g., REC001) or appointment_id (e.g., APPT002) selected by the patient from the list.", "to": "GetMedicalRecord"}, {"arrows": "to", "from": "ListAvailableProviders", "label": "Common follow-up: patient picks a provid\u2026", "title": "Common follow-up: patient picks a provider from the list and asks for more info (schedule, languages, fee). Agent would call this using provider_id (selected from the provider list).", "to": "GetProviderDetails"}, {"arrows": "to", "from": "ListAvailableProviders", "label": "Very common next step: patient chooses a\u2026", "title": "Very common next step: patient chooses a provider and wants to book. Agent would use patient_id (authenticated), provider_id, date, time, appointment_type (and possibly bill_insurance/voucher_id).", "to": "ScheduleAppointment"}, {"arrows": "to", "from": "ListPatientAppointments", "label": "After listing appointments, a patient of\u2026", "title": "After listing appointments, a patient often asks for more info on one specific visit (meeting link, copay, notes). Agent would use an appointment_id the patient picks from the list (e.g., APPT001).", "to": "GetAppointmentDetails"}, {"arrows": "to", "from": "ListPatientAppointments", "label": "The appointment list shows provider name\u2026", "title": "The appointment list shows provider names/specialties; a common follow-up is \u201ctell me more about this doctor\u201d (languages, fees, schedule). Agent would use provider_id for the provider tied to the chosen appointment.", "to": "GetProviderDetails"}, {"arrows": "to", "from": "ListPatientAppointments", "label": "A common follow-up after seeing complete\u2026", "title": "A common follow-up after seeing completed/past appointments is \u201ccan I see the notes/record from that visit?\u201d Agent can look up by appointment_id from the listed appointments (or record_id if patient has it).", "to": "GetMedicalRecord"}, {"arrows": "to", "from": "ListPatientAppointments", "label": "After reviewing their existing appointme\u2026", "title": "After reviewing th w medication/supplier and asks whether it interacts with their current meds. Inputs: primary_medication, current_medications (list).", "to": "CheckDrugInteractions"}, {"arrows": "to", "from": "ListMedicationSuppliers", "label": "A realistic follow-up is documenting the\u2026", "title": "A realistic follow-up is documenting the chosen supplier into the patient\u2019s prescription/record after discussing options. Inputs: record_id, medication, supplier_company, brand_name, price_usd (currency optional).", "to": "RescheduleAppointment"}, {"arrows": "to", "from": "ListMedicationSuppliers", "label": "If supplier info affects the chart, the \u2026", "title": "If supplier info affects the chart, the agent may add a note like \u201cPatient requested supplier pricing info\u201d or \u201cPreferred supplier discussed.\u201d Inputs: record_id, note (metadata optional).", "to": "UpdateMedicalRecordNote"}, {"arrows": "to", "from": "ListTelemetryUploads", "label": "After listing uploads, a common next ste\u2026", "title": "After listing uploads, a common next step is the patient asking which device to pick/check or confirming the device_id; listing telemetry devices can help identify the correct device. Inputs: optional status_filter, limit.", "to": "ListTelemetryDevices"}, {"arrows": "to", "from": "CheckDrugInteractions", "label": "If the patient decides on a different ph\u2026", "title": "If the patient decides on a different pharmacy/supplier for the medication after discussing interactions/cost, updating the prescription supplier can be a plausible follow-up, requiring record_id, medication, supplier_company, brand_name, price_usd.", "to": "UpdatePrescriptionSupplier"}, {"arrows": "to", "from": "ScheduleAppointment", "label": "After scheduling, the patient often asks\u2026", "title": "After scheduling, the patient often asks to confirm details or retrieve the meeting link/billing info; agent can fetch using the new appointment_id (APPT###) returned by scheduling.", "to": "GetA
