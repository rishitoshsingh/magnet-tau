c2fc", "id": "UpdateMedicalRecordNote", "label": "UpdateMedicalRecordNote", "shape": "dot"}]);

or who authored a record/visit; the agent can fetch provider details using provider_id (typically obtained from a selected record/appointment, or provided by the patient).", "to": "GetProviderDetails"}, {"arrows": "to", "from": "ListPatientMedicalRecords", "label": "A common next step is the patient select\u2026", "title": "A common next step is the patient selecting one record from the list to view full contents; the agent would call this with record_id (from the list) or appointment_id (from the list).", "to": "GetMedicalRecord"}, {"arrows": "to", "from": "ListPatientMedicalRecords", "label": "After viewing the record list, patients \u2026", "title": "After viewing the record list, patients often want to book a follow-up related to a recent record (e.g., discuss results); the agent may list providers (optionally by specialty) using specialty if the patient specifies it.", "to": "ListAvailableProviders"}, {"arrows": "to", "from": "ListPatientMedicalRecords", "label": "Patients commonly pivot from records to \u2026", "title": "Patients commonly pivot from records to upcoming/past visits (\u201cshow my appointments related to these records\u201d); agent would list appointments using patient_id (already known post-auth).", "to": "ListPatientAppointments"}, {"arrows": "to", "from": "ListPatientMedicalRecords", "label": "A common next step after reviewing recor\u2026", "title": "A common next step after reviewing records is scheduling a follow-up; agent would schedule using patient_id plus user-provided provider_id, date (YYYY-MM-DD), time (HH:MM), and appointment_type (after explicit confirmation).", "to": "ScheduleAppointment"}, {"arrows": "to", "from": "ListPatientMedicalRecords", "label": "A patient may identify an appointment fr\u2026", "title": "A patient may identify an appointment from the record list and ask to cancel it; agent would cancel using appointment_id (from the record line or provided) after confirming cancellation details.", "to": "CancelAppointment" er listing, patient may ask about the doctor (languages, fee, schedule) for an appointment shown; agent would use provider_id (from the appointment line/details) to retrieve provider info.", "to": "GetProviderDetails"}, {"arrows": "to", "from": "ListPatientAppointments", "label": "After listing past/completed appointment\u2026", "title": "After listing past/completed appointments, patient may ask for the record/notes from a specific visit; agent would call this with appointment_id (from the list) or record_id (if the patient has it).", "to": "GetMedicalRecord"}, {"arrows": "to", "from": "ListPatientAppointments", "label": "A common follow-up to seeing appointment\u2026", "title": "A common follow-up to seeing appointments is asking for records from a specific past visit; agent would list records using patient_id (already known from the target call) and optionally ask limit.", "to": "ListPatientMedicalRecords"}, {"arrows": "to", "from": "ListPatientAppointments", "label": "If the patient, after seeing their appoi\u2026", "title": "If the patient, after seeing their appointment list, wants to book another visit (or find a different specialist), the agent may list providers; user would provide specialty (optional).", "to": "ListAvailableProviders"}, {"arrows": "to", "from": "ListPatientAppointments", "label": "After reviewing their appointments, a pa\u2026", "title": "After reviewing their appointments, a patient may want to schedule a new one (e.g., follow-up) if nothing is on the calendar; user would provide provider_id, date, time, appointment_type (and bill_insurance/voucher_id optional).", "to": "ScheduleAppointment"}, {"arrows": "to", "from": "ListPatientAppointments", "label": "A very common next step after listing is\u2026", "title": "A very common next step after listing is cancelling a specific scheduled/pending appointment; user would provide appointment_id (chosen from the list) and (per policy) confirm cancellation details.", "to": "CancelAppointment"}, {" tep is to look up the patie\u2026", "title": "Common next step is to look up the patient\u2019s recent records to confirm the current medication list (since the interaction tool needs a regimen and patients may be unsure). Requires patient_id (authenticated patient).", "to": "ListPatientMedicalRecords"}, {"arrows": "to", "from": "ScheduleAppointment", "label": "After scheduling, a patient often asks t\u2026", "title": "After scheduling, a patient often asks to confirm the appointment info or to resend the meeting link/billing details; the agent can fetch it using the new appointment_id (APPT###) returned by scheduling.", "to": "GetAppointmentDetails"}, {"arrows": "to", "from": "ScheduleAppointment", "label": "If the patient asks follow-up questions \u2026", "title": "If the patient asks follow-up questions like provider schedule, languages, fee, or contact info right after booking, the agent can pull details using provider_id (e.g., dr_smith_cardiology).", "to": "GetProviderDetails"}, {"arrows": "to", "from": "ScheduleAppointment", "label": "If the patient immediately realizes they\u2026", "title": "If the patient immediately realizes they booked the wrong time/provider or no longer need it, cancellation is a plausible next action, but requires explicit patient confirmation per policy; would use appointment_id.", "to": "CancelAppointment"}, {"arrows": "to", "from": "ScheduleAppointment", "label": "Rescheduling is a common follow-up when \u2026", "title": "Rescheduling is a common follow-up when the patient wants a different slot right after booking; requires explicit patient confirmation and needs appointment_id plus new_date and new_time.", "to": "RescheduleAppointment"}, {"arrows": "to", "from": "ScheduleAppointment", "label": "Updating a prescription supplier is unre\u2026", "title": "Updating a prescription supplier is unrelated to scheduling and requires an existing medical record with prescriptions; would need record_id plus medication and supplier fields.", "
