              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "green", "id": "GetServiceDetails", "label": "GetServiceDetails", "shape": "dot", "title": "Customer can reasonably ask for details about a specific service (e.g., \u0027Tell me about the Unlimited Mobile Plan\u0027) by providing a known service_id like \u0027mobile_unlimited\u0027. The service_id is human-readable and commonly known, making it a valid entry point without requiring prior discovery steps."}, {"color": "green", "id": "GetDeviceDetails", "label": "GetDeviceDetails", "shape": "dot", "title": "The function can be a root because the input \u0027device_name\u0027 is human-facing and commonly known (e.g., iPhone 15 Pro). Customers can reasonably ask for specs of a specific device without prerequisite steps."}, {"color": "green", "id": "GetBillingDetails", "label": "GetBillingDetails", "shape": "dot", "title": "GetBillingDetails can be a natural entry point when a customer contacts support to \u0027check my bill\u0027 or \u0027review my charges\u0027. The only required input is customer_id, which is human-facing and typically obtained at the start of the interaction via authentication (e.g., email or phone lookup). No multi-step discovery is needed."}, {"color": "green", "id": "ManageService", "label": "ManageService", "shape": "dot", "title": "ManageService can be a root function because the customer can directly request to add, remove, or list services using their customer_id, which is human-facing (e.g., \u0027john_smith_1234\u0027). The action is explicit, and no prerequisite discovery or internal-only IDs are required. Service_id for add/remove can be provided by the user or confirmed after listing."}, {"color": "green", "id": "TroubleshootDevice", "label": "TroubleshootDevice", "shape": "dot", "title": "The function can be a root because customers commonly contact support with device-specific issues (e.g., \u0027My iPhone 15 Pro has no service\u0027). The inputs (device_name and issue) are human-facing and typically provided directly by the user in natural language."}, {"color": "green", "id": "CreateSupportTicket", "label": "CreateSupportTicket", "shape": "dot", "title": "The function can be a root because it requires only the customer_id (which can be obtained via authentication) and category (provided by user intent). These inputs are either human-facing or derivable after basic lookup, and no multi-step prerequisites are needed before creating a ticket."}, {"color": "green", "id": "GetSupportTicketDetails", "label": "GetSupportTicketDetails", "shape": "dot", "title": "The function can be a root because customers often contact support with a ticket ID to check its status. The only required input is ticket_id, which is human-facing (e.g., provided in an email or previous communication) and does not require internal discovery or multi-step prerequisites."}, {"color": "green", "id": "AddDevice", "label": "AddDevice", "shape": "dot", "title": "The function can be a root because it requires only customer_id (obtainable via lookup) and device_name (from a known catalog), both of which are human-facing or derivable. Customers commonly request to add a new device, making this a plausible first action after authentication."}, {"color": "green", "id": "ManageBilling", "label": "ManageBilling", "shape": "dot", "title": "ManageBilling can be a root function because it only requires the customer_id (which can be provided by the user via email or phone and confirmed by authentication) and explicit preferences for paperless, auto_pay, and billing_cycle \u2014 all of which are directly specifiable by the customer in a support request."}, {"color": "green", "id": "GetServices", "label": "GetServices", "shape": "dot", "title": "The function can be a root because it requires no inputs and provides public catalog information. Customers can reasonably initiate contact to explore available services, and no prerequisite steps or customer-specific identifiers are needed."}, {"color": "#97c2fc", "id": "GetSeniorDiscount", "label": "GetSeniorDiscount", "shape": "dot"}, {"color": "green", "id": "ModifySupportTicket", "label": "ModifySupportTicket", "shape": "dot", "title": "The function can be a root because a customer may contact support requesting to update a ticket\u0027s status or priority, and the ticket_id is a human-facing identifier that customers typically know. The required inputs (ticket_id, status, priority) are either provided directly by the user or selected from enumerated options."}, {"color": "green", "id": "RecordPayment", "label": "RecordPayment", "shape": "dot", "title": "The function can be a root because a customer may initiate contact to make a payment. Required inputs (customer_id, amount, method, date) are either known to the customer or can be provided in natural language. Customer_id is human-facing (e.g., \u0027john_smith_1234\u0027), and other inputs are standard payment details."}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "GetServiceDetails", "label": "Agent may need device details after revi\u2026", "title": "Agent may need device details after reviewing a service to assess compatibility or troubleshoot; user provides service context and device name.", "to": "GetDeviceDetails"}, {"arrows": "to", "from": "GetServiceDetails", "label": "After checking service details, agent ma\u2026", "title": "After checking service details, agent may retrieve customer\u0027s billing to discuss cost impact; customer_id is typically known post-authentication.", "to": "GetBillingDetails"}, {"arrows": "to", "from": "GetServiceDetails", "label": "Agent might add or remove the service af\u2026", "title": "Agent might add or remove the service after reviewing its details; requires customer_id and confirmation from user.", "to": "ManageService"}, {"arrows": "to", "from": "GetServiceDetails", "label": "If service issue is suspected, agent may\u2026", "title": "If service issue is suspected, agent may troubleshoot a related device; user provides device and issue type.", "to": "TroubleshootDevice"}, {"arrows": "to", "from": "GetServiceDetails", "label": "Agent may create a ticket if service det\u2026", "title": "Agent may create a ticket if service details reveal an unresolved problem; customer_id and issue category come from context.", "to": "CreateSupportTicket"}, {"arrows": "to", "from": "GetServiceDetails", "label": "Agent may check existing ticket status r\u2026", "title": "Agent may check existing ticket status related to the service; ticket_id can be inferred or provided by user.", "to": "GetSupportTicketDetails"}, {"arrows": "to", "from": "GetServiceDetails", "label": "Agent may add a device to pair with the \u2026", "title": "Agent may add a device to pair with the service being reviewed; customer_id and device_name are user-provided.", "to": "AddDevice"}, {"arrows": "to", "from": "GetServiceDetails", "label": "Agent may update billing preferences aft\u2026", "title": "Agent may update billing preferences after discussing service costs; customer_id and user preferences are available.", "to": "ManageBilling"}, {"arrows": "to", "from": "GetServiceDetails", "label": "Agent may list all services to compare w\u2026", "title": "Agent may list all services to compare with the one reviewed; no inputs needed beyond authenticated customer context.", "to": "GetServices"}, {"arrows": "to", "from": "GetServiceDetails", "label": "Agent may apply senior discount to the s\u2026", "title": "Agent may apply senior discount to the service price just retrieved; original_price comes from get_service_details output.", "to": "GetSeniorDiscount"}, {"arrows": "to", "from": "GetServiceDetails", "label": "Agent may update a ticket related to the\u2026", "title": "Agent may update a ticket related to the service; ticket_id, status, and priority are provided by user.", "to": "ModifySupportTicket"}, {"arrows": "to", "from": "GetServiceDetails", "label": "Agent may record a payment if service re\u2026", "title": "Agent may record a payment if service review reveals a balance; customer_id and payment details are provided by user.", "to": "RecordPayment"}, {"arrows": "to", "from": "GetDeviceDetails", "label": "A customer may want to check service det\u2026", "title": "A customer may want to check service details after learning about a device\u0027s capabilities to see which plan suits it. User-provided input: device_name (from prior context), service_id (inferred or requested).", "to": "GetServiceDetails"}, {"arrows": "to", "from": "GetDeviceDetails", "label": "After retrieving device details, the age\u2026", "title": "After retrieving device details, the agent might need the customer\u0027s billing info to discuss costs or payment options. User-provided input: customer_id (from authentication or profile lookup).", "to": "GetBillingDetails"}, {"arrows": "to", "from": "GetDeviceDetails", "label": "Agent may proceed to manage services (e.\u2026", "title": "Agent may proceed to manage services (e.g., add a new service) after confirming device compatibility. User-provided input: customer_id, service_id, action (add/remove/list), optional device_ids.", "to": "ManageService"}, {"arrows": "to", "from": "GetDeviceDetails", "label": "After identifying a device issue (e.g., \u2026", "title": "After identifying a device issue (e.g., battery drain), the agent can provide troubleshooting steps. User-provided input: device_name (same as target), issue type (from customer).", "to": "TroubleshootDevice"}, {"arrows": "to", "from": "GetDeviceDetails", "label": "If device troubleshooting fails, creatin\u2026", "title": "If device troubleshooting fails, creating a support ticket is a natural next step. User-provided input: customer_id, category (e.g., \u0027device\u0027), priority (based on urgency).", "to": "CreateSupportTicket"}, {"arrows": "to", "from": "GetDeviceDetails", "label": "After retrieving device details, the age\u2026", "title": "After retrieving device details, the agent might check an existing ticket related to that device. User-provided input: ticket_id (provided by customer or from prior interaction).", "to": "GetSupportTicketDetails"}, {"arrows": "to", "from": "GetDeviceDetails", "label": "After confirming device specs, the agent\u2026", "title": "After confirming device specs, the agent may add the device to the customer\u2019s account. User-provided input: customer_id, device_name (same as target).", "to": "AddDevice"}, {"arrows": "to", "from": "GetDeviceDetails", "label": "Agent may list all services to help user\u2026", "title": "Agent may list all services to help user choose one after reviewing device capabilities. No additional user input needed beyond customer context.", "to": "GetServices"}, {"arrows": "to", "from": "GetDeviceDetails", "label": "If the customer is eligible, applying a \u2026", "title": "If the customer is eligible, applying a senior discount to a service price may follow device and service review. User-provided input: original_price (from service details), eligibility (stated by user).", "to": "GetSeniorDiscount"}, {"arrows": "to", "from": "GetDeviceDetails", "label": "Agent may need to update a ticket (e.g.,\u2026", "title": "Agent may need to update a ticket (e.g., escalate priority) after diagnosing a device issue. User-provided input: ticket_id, new status, new priority.", "to": "ModifySupportTicket"}, {"arrows": "to", "from": "GetDeviceDetails", "label": "If the device is being added or replaced\u2026", "title": "If the device is being added or replaced, the customer may make a payment. User-provided input: customer_id, amount, method, date.", "to": "RecordPayment"}, {"arrows": "to", "from": "GetBillingDetails", "label": "After retrieving billing details, the cu\u2026", "title": "After retrieving billing details, the customer may ask for more information about a specific service listed in their monthly charges. The agent can use GetServiceDetails to fetch plan details (e.g., data limits, features) for clarification. User-provided input: service_id from monthly_charges.", "to": "GetServiceDetails"}, {"arrows": "to", "from": "GetBillingDetails", "label": "Customer sees their services in billing \u2026", "title": "Customer sees their services in billing and wants to modify them (e.g., remove a plan to reduce cost). ManageService allows adding/removing services. This is a common workflow after reviewing charges. User-provided input: customer_id (already known), service_id (from billing).", "to": "ManageService"}, {"arrows": "to", "from": "GetBillingDetails", "label": "Customer may report a device issue (e.g.\u2026", "title": "Customer may report a device issue (e.g., slow internet) after seeing high charges. Agent can troubleshoot the associated device (e.g., router). This is plausible if the billing context includes internet service. User-provided input: device_name (inferred or stated), issue type.", "to": "TroubleshootDevice"}, {"arrows": "to", "from": "GetBillingDetails", "label": "Customer sees unexpected charges and wan\u2026", "title": "Customer sees unexpected charges and wants to escalate. Agent creates a billing-related support ticket. This is a routine follow-up for disputes. User-provided input: customer_id (known), category=\u0027billing\u0027, priority (based on urgency).", "to": "CreateSupportTicket"}, {"arrows": "to", "from": "GetBillingDetails", "label": "Customer wants to check the status of a \u2026", "title": "Customer wants to check the status of a previous billing or service issue. After viewing current billing, they may reference an old ticket. Agent retrieves it. User-provided input: ticket_id (provided by customer).", "to": "GetSupportTicketDetails"}, {"arrows": "to", "from": "GetBillingDetails", "label": "After reviewing billing, customer may wa\u2026", "title": "After reviewing billing, customer may want to update preferences (e.g., disable auto-pay, switch to paperless). ManageBilling enables these changes. User-provided input: customer_id, paperless, auto_pay, billing_cycle.", "to": "ManageBilling"}, {"arrows": "to", "from": "GetBillingDetails", "label": "Customer may want to compare their curre\u2026", "title": "Customer may want to compare their current services with available plans to find savings. GetServices provides full catalog for comparison. Plausible after reviewing high charges. User-provided input: none required.", "to": "GetServices"}, {"arrows": "to", "from": "GetBillingDetails", "label": "Customer has an outstanding balance and \u2026", "title": "Customer has an outstanding balance and wants to pay. Recording the payment is a direct and common action after reviewing the current balance. User-provided input: customer_id, amount, method, date.", "to": "RecordPayment"}, {"arrows": "to", "from": "ManageService", "label": "After listing or modifying services, the\u2026", "title": "After listing or modifying services, the agent may need to fetch detailed pricing or category info for a specific service to explain it to the user. The service_id is available from the ManageService output. User-provided input: none (service_id comes from prior step).", "to": "GetServiceDetails"}, {"arrows": "to", "from": "ManageService", "label": "After managing services (e.g., adding or\u2026", "title": "After managing services (e.g., adding or removing), the agent may need to verify the updated billing impact. The customer_id is available from the ManageService call. User-provided input: customer_id (already known).", "to": "GetBillingDetails"}, {"arrows": "to", "from": "ManageService", "label": "After adding or removing a service, the \u2026", "title": "After adding or removing a service, the user may report device-level issues (e.g., phone not connecting). The agent can then troubleshoot using the device name. User-provided input: device_name, issue (from user).", "to": "TroubleshootDevice"}, {"arrows": "to", "from": "ManageService", "label": "If a service change fails or causes an i\u2026", "title": "If a service change fails or causes an issue (e.g., loss of internet), the agent may create a support ticket to escalate. The customer_id is known. User-provided input: customer_id, category, priority (from user request).", "to": "CreateSupportTicket"}, {"arrows": "to", "from": "ManageService", "label": "After managing a service, the agent may \u2026", "title": "After managing a service, the agent may need to check the status of an existing ticket related to service activation or outage. The customer_id from ManageService can help identify relevant tickets. User-provided input: ticket_id (from user or prior context).", "to": "GetSupportTicketDetails"}, {"arrows": "to", "from": "ManageService", "label": "After removing a service, the user may w\u2026", "title": "After removing a service, the user may want to add a new device for a new plan. Or after adding a service, they may need a compatible device. The customer_id is known. User-provided input: customer_id, device_name (from user).", "to": "AddDevice"}, {"arrows": "to", "from": "ManageService", "label": "After modifying services, the agent may \u2026", "title": "After modifying services, the agent may need to update billing preferences (e.g., enable auto-pay for new charges). The customer_id is available. User-provided input: customer_id, paperless, auto_pay, billing_cycle (from user request).", "to": "ManageBilling"}, {"arrows": "to", "from": "ManageService", "label": "After creating a ticket due to a service\u2026", "title": "After creating a ticket due to a service issue, the agent or user may later want to modify its status or priority. The ticket_id would come from prior interaction. User-provided input: ticket_id, status, priority (from user).", "to": "ModifySupportTicket"}, {"arrows": "to", "from": "ManageService", "label": "After adding a service with new charges,\u2026", "title": "After adding a service with new charges, the user may make a payment to cover the balance. The customer_id is known. User-provided input: customer_id, amount, method, date (from user).", "to": "RecordPayment"}, {"arrows": "to", "from": "TroubleshootDevice", "label": "Plausible follow-up: After troubleshooti\u2026", "title": "Plausible follow-up: After troubleshooting, the agent may need to verify device specifications (e.g., model, category) to ensure correct steps were provided. Uses device_name from prior context.", "to": "GetDeviceDetails"}, {"arrows": "to", "from": "TroubleshootDevice", "label": "Plausible follow-up: If troubleshooting \u2026", "title": "Plausible follow-up: If troubleshooting fails, creating a support ticket (e.g., category=\u0027device\u0027, priority=\u0027medium\u0027 or \u0027high\u0027) is a standard escalation path. Uses customer_id and device_name from context.", "to": "CreateSupportTicket"}, {"arrows": "to", "from": "TroubleshootDevice", "label": "Plausible follow-up: Agent may check exi\u2026", "title": "Plausible follow-up: Agent may check existing ticket status for the same device or issue to avoid duplicates. Requires ticket_id, which could be derived from prior interactions or customer input.", "to": "GetSupportTicketDetails"}, {"arrows": "to", "from": "TroubleshootDevice", "label": "Plausible follow-up: If the device is no\u2026", "title": "Plausible follow-up: If the device is not in the customer\u0027s inventory, agent may add it after troubleshooting reveals it\u0027s a new or missing device. Uses customer_id and device_name.", "to": "AddDevice"}, {"arrows": "to", "from": "TroubleshootDevice", "label": "Plausible follow-up: Agent may need to e\u2026", "title": "Plausible follow-up: Agent may need to escalate or update an existing ticket (e.g., raise priority) if troubleshooting reveals severity. Uses ticket_id and customer_id from context.", "to": "ModifySupportTicket"}, {"arrows": "to", "from": "CreateSupportTicket", "label": "Plausible follow-up: After creating a ti\u2026", "title": "Plausible follow-up: After creating a ticket, the agent may need to retrieve its details to confirm status or share with the customer. User-provided input: ticket_id.", "to": "GetSupportTicketDetails"}, {"arrows": "to", "from": "CreateSupportTicket", "label": "Plausible follow-up: After creating a ti\u2026", "title": "Plausible follow-up: After creating a ticket, the agent or customer may want to modify its priority or status (e.g., escalate). User-provided inputs: ticket_id, new status, new priority.", "to": "ModifySupportTicket"}, {"arrows": "to", "from": "GetSupportTicketDetails", "label": "Plausible follow-up: After viewing a sup\u2026", "title": "Plausible follow-up: After viewing a support ticket, the agent may need the customer\u0027s billing details\u2014especially if the ticket is billing-related (e.g., disputed charge). User-provided input: customer_id (from ticket details).", "to": "GetBillingDetails"}, {"arrows": "to", "from": "GetSupportTicketDetails", "label": "Plausible follow-u
