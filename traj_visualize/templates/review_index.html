<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Claim Review</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container py-5">
        <h1 class="mb-3">User Claim Review</h1>
        <p class="text-muted mb-4">Review only user turns against the task instruction to spot fabricated or inconsistent identity and trip details.</p>
        <form id="reviewForm" method="get" action="/review" class="card p-4 shadow-sm">
            <label for="file" class="form-label">JSON file path</label>
            <input type="text" id="file" name="file" class="form-control mb-3" placeholder="/path/to/json">
            <button type="submit" class="btn btn-primary">Open Review</button>
        </form>
    </div>
</body>

</html>
